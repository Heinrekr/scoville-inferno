<header class="app-header">
    <div class="container header-inner">
        <a class="brand" routerLink="/products">
            <img src="main-logo.svg" alt="logo" />
            <span class="brand-text">The Scoville Inferno</span>
        </a>

        <nav class="nav">
            <a class="nav-link" routerLink="/products" routerLinkActive="active">Products</a>
            <a class="nav-link" routerLink="/home" routerLinkActive="active">Community</a>
            <a class="nav-link" routerLink="/home" routerLinkActive="active">Resources</a>
            <a class="nav-link" routerLink="/home" routerLinkActive="active">Contact</a>
            <a class="nav-link" routerLink="/admin/products" routerLinkActive="active">Management</a>
        </nav>

        <div class="actions">
            @if (cartCount() > 0) {
            <a routerLink="/cart">
                <p-overlaybadge [value]="cartCount()" severity="danger">
                    <button pButton severity="secondary" outlined="true">
                        <i class="pi pi-shopping-cart" pButtonIcon></i>
                    </button>
                </p-overlaybadge>
            </a>
            } @else {
            <a routerLink="/cart">
                <button pButton severity="secondary" outlined="true">
                    <i class="pi pi-shopping-cart" pButtonIcon></i>
                </button>
            </a>
            }
            @if (!isAuthenticated()) {
            <a routerLink="/login"><button pButton label="Sign in" severity="secondary" outlined="true"></button></a>
            <a routerLink="/register"><button pButton label="Register"></button></a>
            }
            @if (isAuthenticated()) {
            <a routerLink="/account">
                <button pButton severity="secondary" outlined="true">
                    <i class="pi pi-user" pButtonIcon></i>
                </button>
            </a>
            <button (click)="logout()" pButton label="Logout" severity="secondary" outlined="true"></button>
            }
        </div>
    </div>
</header>
